<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코브라 게임 (Snake Game)</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        #score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            border: 4px solid #4CAF50;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff4c4c;
            font-size: 2rem;
            font-weight: bold;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }

        #restart-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>코브라 게임</h1>
    <div id="score-board">점수: <span id="score">0</span></div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="game-over-screen">
            <div>GAME OVER</div>
            <button id="restart-btn" onclick="resetGame()">다시 시작</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over-screen");

        // 그리드 및 게임 속도 설정
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const gameSpeed = 100; // 밀리초 (낮을수록 빠름)

        // 게임 상태 변수
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // 수평 이동 속도
        let dy = 0;        // 수직 이동 속도
        let score = 0;
        let gameInterval;
        let changingDirection = false; // 한 프레임 내 연속 방향 전환 방지

        // 게임 시작
        initGame();

        function initGame() {
            // 초기 코브라 위치 (중앙 부근)
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            score = 0;
            dx = gridSize;
            dy = 0;
            scoreElement.innerText = score;
            gameOverScreen.style.display = "none";
            
            createFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(main, gameSpeed);
        }

        function resetGame() {
            initGame();
        }

        // 메인 게임 루프
        function main() {
            if (hasGameEnded()) {
                gameOverScreen.style.display = "flex";
                clearInterval(gameInterval);
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // 캔버스 초기화
        function clearCanvas() {
            ctx.fillStyle = "#111111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 코브라 그리기
        function drawSnake() {
            snake.forEach((part, index) => {
                // 머리는 조금 더 밝은 색상으로 구분
                ctx.fillStyle = index === 0 ? "#66bb6a" : "#4CAF50";
                ctx.strokeStyle = "#111111";
                
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        // 코브라 이동 및 음식 섭취 로직
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        // 무작위 위치에 음식 생성
        function createFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // 코브라의 몸 위에 음시이 생기지 않도록 재귀 확인
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) createFood();
            });
        }

        // 음식 그리기
        function drawFood() {
            ctx.fillStyle = "#ff4c4c";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff4c4c";
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            ctx.shadowBlur = 0; // 다른 그림자에 영향 주지 않도록 초기화
        }

        // 충돌 감지 (게임 종료 조건)
        function hasGameEnded() {
            // 자신의 몸에 부딪혔는지 확인
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // 벽에 부딪혔는지 확인
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // 키보드 입력 처리
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // 방향키 키코드 상수
            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;

            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }
    </script>
</body>
</html>
