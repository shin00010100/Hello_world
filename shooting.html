<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평범한 슈팅게임</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
        }

        #ui-container {
            width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #lives-display {
            color: #00ff00;
            letter-spacing: 3px;
        }

        #boss-hp-container {
            width: 600px;
            height: 20px;
            background-color: #222;
            border: 2px solid #ff3333;
            margin-bottom: 10px;
            visibility: hidden;
            position: relative;
        }

        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.1s ease-out;
        }

        #boss-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            top: 2px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        #overlay-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 600px;
            height: 500px;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        #overlay-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .game-over-text { color: #ff3333; }

        #restart-btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            background-color: #00ff00;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background-color: #00cc00;
            box-shadow: 0 0 10px #00ff00;
        }

        #controls-guide {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>평범한 슈팅게임</h1>
    
    <div id="ui-container">
        <div>SCORE: <span id="score">0</span></div>
        <div>STAGE: <span id="stage">1</span></div>
        <div>LIVES: <span id="lives-display"></span></div>
    </div>

    <div id="boss-hp-container">
        <div id="boss-hp-bar"></div>
        <div id="boss-text">WARNING: BOSS APPEARED</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div id="overlay-screen">
            <div id="overlay-title">GAME OVER</div>
            <button id="restart-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="controls-guide">
        [← / →] 또는 [A / D] : 이동 | [Spacebar] : 미사일 발사 (피격 시 무적 1초)<br>
        <strong>[Shift 누르고 있기] : 저속 모드 (정밀 회피)</strong>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const stageElement = document.getElementById("stage");
        const livesDisplay = document.getElementById("lives-display");
        const bossHpContainer = document.getElementById("boss-hp-container");
        const bossHpBar = document.getElementById("boss-hp-bar");
        const overlayScreen = document.getElementById("overlay-screen");
        const overlayTitle = document.getElementById("overlay-title");

        // 게임 기본 설정
        let score = 0;
        let stage = 1;
        let lives = 3;
        const maxLives = 3; // 목숨 최대 한도 상한선
        let isGameOver = false;

        // 플레이어 설정 (이동 속도 변수 분리)
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 40,
            width: 40,
            height: 20,
            normalSpeed: 6,    // 일반 속도
            slowSpeed: 3,      // 저속 모드 속도
            isMovingLeft: false,
            isMovingRight: false,
            isSlowMode: false, // Shift 키 입력 여부
            isInvincible: false,
            invincibleTimer: 0
        };

        // 투사체 및 적 배열
        let playerBullets = [];
        let enemyBullets = []; 
        let invaders = [];

        // 일반 외계인 설정
        const invaderRows = 4;
        const invaderCols = 8;
        const invaderWidth = 35;
        const invaderHeight = 25;
        const invaderPadding = 15;
        const invaderOffsetTop = 50;
        const invaderOffsetLeft = 50;
        
        let invaderDirection = 1; 
        let invaderSpeed = 1;
        let invaderDropDistance = 15;
        let enemyShootProbability = 0.005;

        // 보스(Boss) 객체 정의
        const boss = {
            x: 0,
            y: 0,
            width: 60,   
            height: 40,
            speed: 2.5,  
            direction: 1,
            active: false,
            hp: 10,       // 기본 체력 10으로 하향 조정
            maxHp: 10,
            shootCooldown: 0,
            patternTimer: 0
        };

        // 키보드 제어 이벤트 핸들러
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = true;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = true;
            if (e.key === "Shift") player.isSlowMode = true; // 저속 모드 활성화
            if (e.key === " " || e.code === "Space") {
                e.preventDefault();
                firePlayerBullet();
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = false;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = false;
            if (e.key === "Shift") player.isSlowMode = false; // 저속 모드 해제
        });

        // 최초 실행
        initGame();

        function initGame() {
            score = 0;
            stage = 1;
            lives = 3;
            isGameOver = false;
            invaderSpeed = 1;
            enemyShootProbability = 0.005;
            
            scoreElement.innerText = score;
            stageElement.innerText = stage;
            updateLivesUI();
            overlayScreen.style.display = "none";
            bossHpContainer.style.visibility = "hidden";

            playerBullets = [];
            enemyBullets = [];
            player.isInvincible = false;
            player.isSlowMode = false;
            player.x = canvas.width / 2 - 20;
            boss.active = false;

            createInvaders();
            
            cancelAnimationFrame(gameLoop);
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            initGame();
        }

        function updateLivesUI() {
            let livesText = "";
            for (let i = 0; i < lives; i++) {
                livesText += "▲ ";
            }
            livesDisplay.innerText = livesText || "NONE";
        }

        // 보스 격파 시 다음 라운드 진입 로직
        function nextStage() {
            // 보스 보상: 목숨 +1 지급 (최대 3개 제한)
            if (lives < maxLives) {
                lives++;
                updateLivesUI();
            }

            stage++;
            stageElement.innerText = stage;
            invaderSpeed = 1 + (stage * 0.2); 
            enemyShootProbability = 0.005 + (stage * 0.001);
            playerBullets = [];
            enemyBullets = [];
            boss.active = false;
            bossHpContainer.style.visibility = "hidden";
            createInvaders();
        }

        function spawnBoss() {
            boss.active = true;
            // 라운드에 따라 체력 2씩 점진적 증가 (1라운드:10, 2라운드:12, 3라운드:14...)
            boss.maxHp = 10 + (stage - 1) * 2; 
            boss.hp = boss.maxHp;
            boss.x = canvas.width / 2 - boss.width / 2;
            boss.y = 60;
            boss.speed = 2.5 + (stage * 0.3); 
            boss.shootCooldown = 0;
            boss.patternTimer = 0;
            
            bossHpContainer.style.visibility = "visible";
            updateBossHpBar();
        }

        function updateBossHpBar() {
            const hpPercentage = (boss.hp / boss.maxHp) * 100;
            bossHpBar.style.width = hpPercentage + "%";
        }

        function createInvaders() {
            invaders = [];
            for (let r = 0; r < invaderRows; r++) {
                for (let c = 0; c < invaderCols; c++) {
                    invaders.push({
                        x: c * (invaderWidth + invaderPadding) + invaderOffsetLeft,
                        y: r * (invaderHeight + invaderPadding) + invaderOffsetTop,
                        width: invaderWidth,
                        height: invaderHeight,
                        alive: true,
                        color: r % 2 === 0 ? "#00ffff" : "#ff00ff"
                    });
                }
            }
        }

        function firePlayerBullet() {
            if (isGameOver) return;
            if (playerBullets.length < 4) { 
                playerBullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 15,
                    speed: 7
                });
            }
        }

        function enemyShoot() {
            if (boss.active) return; 

            invaders.forEach(invader => {
                if (!invader.alive) return;
                if (Math.random() < enemyShootProbability) {
                    enemyBullets.push({
                        x: invader.x + invader.width / 2 - 2,
                        y: invader.y + invader.height,
                        vx: 0, 
                        vy: 4 + (stage * 0.3),
                        width: 4,
                        height: 12,
                        isBarrage: false
                    });
                }
            });
        }

        function bossShoot() {
            if (!boss.active) return;

            boss.shootCooldown++;
            boss.patternTimer++;

            // 패턴 1: 방사형 네온 탄막
            if (boss.shootCooldown >= 35) {
                boss.shootCooldown = 0;
                
                const baseAngle = Math.PI / 2; 
                const angles = [baseAngle - 0.6, baseAngle - 0.3, baseAngle, baseAngle + 0.3, baseAngle + 0.6];
                
                angles.forEach(angle => {
                    const bSpeed = 4.5; 
                    enemyBullets.push({
                        x: boss.x + boss.width / 2,
                        y: boss.y + boss.height,
                        vx: Math.cos(angle) * bSpeed,
                        vy: Math.sin(angle) * bSpeed,
                        width: 6, 
                        height: 6,
                        isBarrage: true
                    });
                });
            }

            // 패턴 2: 플레이어 방향 3갈래 저격 탄막
            if (boss.patternTimer >= 110) { 
                boss.patternTimer = 0;

                const targetX = player.x + player.width / 2;
                const targetY = player.y;
                const centerAngle = Math.atan2(targetY - (boss.y + boss.height), targetX - (boss.x + boss.width / 2));
                
                const targetAngles = [centerAngle - 0.15, centerAngle, centerAngle + 0.15];

                targetAngles.forEach(angle => {
                    const tSpeed = 5.5; 
                    enemyBullets.push({
                        x: boss.x + boss.width / 2,
                        y: boss.y + boss.height,
                        vx: Math.cos(angle) * tSpeed,
                        vy: Math.sin(angle) * tSpeed,
                        width: 5,
                        height: 10,
                        isBarrage: true
                    });
                });
            }
        }

        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updatePlayerBullets();
            updateEnemyBullets();
            
            if (boss.active) {
                updateBoss();
                bossShoot();
            } else {
                updateInvaders();
                enemyShoot();
            }

            checkCollisions();

            drawPlayer();
            drawPlayerBullets();
            drawEnemyBullets();
            
            if (boss.active) {
                drawBoss();
            } else {
                drawInvaders();
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            // 저속 상태 모드 활성화 여부에 따른 이동속도 차등 설정
            const currentSpeed = player.isSlowMode ? player.slowSpeed : player.normalSpeed;

            if (player.isMovingLeft && player.x > 0) player.x -= currentSpeed;
            if (player.isMovingRight && player.x < canvas.width - player.width) player.x += currentSpeed;

            if (player.isInvincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) player.isInvincible = false;
            }
        }

        function updatePlayerBullets() {
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                playerBullets[i].y -= playerBullets[i].speed;
                if (playerBullets[i].y < 0) playerBullets.splice(i, 1);
            }
        }

        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].x += enemyBullets[i].vx;
                enemyBullets[i].y += enemyBullets[i].vy;

                if (enemyBullets[i].y > canvas.height || enemyBullets[i].x < 0 || enemyBullets[i].x > canvas.width) {
                    enemyBullets.splice(i, 1);
                }
            }
        }

        function updateInvaders() {
            let hitWall = false;
            let aliveCount = 0;

            invaders.forEach(invader => {
                if (!invader.alive) return;
                aliveCount++;
                invader.x += invaderSpeed * invaderDirection;

                if (invader.x + invader.width >= canvas.width || invader.x <= 0) hitWall = true;
                if (invader.y + invader.height >= player.y) triggerGameOver();
            });

            if (hitWall) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    if (invader.alive) invader.y += invaderDropDistance;
                });
            }

            if (aliveCount === 0 && invaders.length > 0 && !boss.active) {
                spawnBoss();
            }
        }

        function updateBoss() {
            boss.x += boss.speed * boss.direction;
            if (boss.x + boss.width >= canvas.width - 20 || boss.x <= 20) {
                boss.direction *= -1;
            }
        }

        function checkCollisions() {
            for (let j = playerBullets.length - 1; j >= 0; j--) {
                const b = playerBullets[j];

                if (boss.active) {
                    if (b.x > boss.x && b.x < boss.x + boss.width &&
                        b.y > boss.y && b.y < boss.y + boss.height) {
                        
                        playerBullets.splice(j, 1);
                        boss.hp--;
                        score += 50;
                        scoreElement.innerText = score;
                        updateBossHpBar();

                        if (boss.hp <= 0) {
                            score += 1000; 
                            scoreElement.innerText = score;
                            nextStage(); // 이 내부에서 목숨 회복 연산 처리됨
                        }
                        continue;
                    }
                } else {
                    for (let i = 0; i < invaders.length; i++) {
                        const inv = invaders[i];
                        if (!inv.alive) continue;

                        if (b.x > inv.x && b.x < inv.x + inv.width &&
                            b.y > inv.y && b.y < inv.y + inv.height) {
                            
                            inv.alive = false;
                            playerBullets.splice(j, 1);
                            score += 20;
                            scoreElement.innerText = score;
                            break;
                        }
                    }
                }
            }

            if (!player.isInvincible) {
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const eb = enemyBullets[i];

                    if (eb.x > player.x && eb.x < player.x + player.width &&
                        eb.y > player.y && eb.y < player.y + player.height) {
                        
                        enemyBullets.splice(i, 1);
                        lives--;
                        updateLivesUI();

                        if (lives <= 0) {
                            triggerGameOver();
                        } else {
                            player.isInvincible = true;
                            player.invincibleTimer = 60; 
                        }
                        break;
                    }
                }
            }
        }

        function drawPlayer() {
            if (player.isInvincible && Math.floor(player.invincibleTimer / 5) % 2 === 0) return;
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(player.x, player.y + 5, player.width, player.height - 5);
            ctx.fillRect(player.x + player.width / 2 - 4, player.y, 8, 5);

            // 저속(정밀) 모드 구동 시 유저 인지를 위해 중앙에 조그마한 점 피격 판정 코어 노출 예외 연출
            if (player.isSlowMode) {
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(player.x + player.width / 2, player.y + player.height / 2 + 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPlayerBullets() {
            ctx.fillStyle = "#ffff00";
            playerBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
        }

        function drawEnemyBullets() {
            enemyBullets.forEach(eb => {
                if (eb.isBarrage) {
                    ctx.fillStyle = "#ffaa00"; 
                    ctx.beginPath();
                    ctx.arc(eb.x, eb.y, eb.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#ff3333"; 
                    ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
                }
            });
        }

        function drawInvaders() {
            invaders.forEach(inv => {
                if (!inv.alive) return;
                ctx.fillStyle = inv.color;
                ctx.fillRect(inv.x, inv.y, inv.width, inv.height);
                
                ctx.fillStyle = "#000000";
                ctx.fillRect(inv.x + 6, inv.y + 6, 5, 5);
                ctx.fillRect(inv.x + inv.width - 11, inv.y + 6, 5, 5);
            });
        }

        function drawBoss() {
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(boss.x, boss.y, boss.width, boss.height);

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(boss.x + 12, boss.y + 10, 10, 10);
            ctx.fillRect(boss.x + boss.width - 22, boss.y + 10, 10, 10);
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(boss.x + 15, boss.y + 13, 5, 5);
            ctx.fillRect(boss.x + boss.width - 19, boss.y + 13, 5, 5);
        }

        function triggerGameOver() {
            isGameOver = true;
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "game-over-text";
            overlayScreen.style.display = "flex";
        }
    </script>
</body>
</html>
