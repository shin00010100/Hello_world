<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페이스 인베이더 - 적 공격 추가 버전</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
        }

        #ui-container {
            width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #game-container {
            position: relative;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        #overlay-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 600px;
            height: 500px;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        #overlay-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .game-over-text { color: #ff3333; }

        #restart-btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            background-color: #00ff00;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background-color: #00cc00;
            box-shadow: 0 0 10px #00ff00;
        }

        #controls-guide {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>SPACE INVADERS</h1>
    
    <div id="ui-container">
        <div>SCORE: <span id="score">0</span></div>
        <div>STAGE: <span id="stage">1</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div id="overlay-screen">
            <div id="overlay-title">GAME OVER</div>
            <button id="restart-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="controls-guide">
        [← / →] 또는 [A / D] : 이동 | [Spacebar] : 미사일 발사 (피격 시 무적 시간 1초)
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const stageElement = document.getElementById("stage");
        const livesElement = document.getElementById("lives");
        const overlayScreen = document.getElementById("overlay-screen");
        const overlayTitle = document.getElementById("overlay-title");

        // 게임 상태 관리
        let score = 0;
        let stage = 1;
        let lives = 3;
        let isGameOver = false;

        // 플레이어 (우주선)
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 40,
            width: 40,
            height: 20,
            speed: 6,
            isMovingLeft: false,
            isMovingRight: false,
            isInvincible: false,  // 피격 후 무적 상태 여부
            invincibleTimer: 0    // 무적 시간 타이머
        };

        // 투사체 및 적 배열
        let playerBullets = [];
        let enemyBullets = [];
        let invaders = [];

        // 외계인 패턴 설정
        const invaderRows = 4;
        const invaderCols = 8;
        const invaderWidth = 35;
        const invaderHeight = 25;
        const invaderPadding = 15;
        const invaderOffsetTop = 50;
        const invaderOffsetLeft = 50;
        
        let invaderDirection = 1; 
        let invaderSpeed = 1;
        let invaderDropDistance = 15;
        let enemyShootProbability = 0.005; // 적이 미사일을 쏠 확률 (기본 스테이지 기준)

        // 키보드 핸들러
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = true;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = true;
            if (e.key === " " || e.code === "Space") {
                e.preventDefault();
                firePlayerBullet();
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = false;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = false;
        });

        // 초기 시작 호출
        initGame();

        function initGame() {
            score = 0;
            stage = 1;
            lives = 3;
            isGameOver = false;
            invaderSpeed = 1;
            enemyShootProbability = 0.005;
            
            scoreElement.innerText = score;
            stageElement.innerText = stage;
            livesElement.innerText = lives;
            overlayScreen.style.display = "none";

            playerBullets = [];
            enemyBullets = [];
            player.isInvincible = false;
            player.x = canvas.width / 2 - 20;

            createInvaders();
            
            cancelAnimationFrame(gameLoop);
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            initGame();
        }

        function nextStage() {
            stage++;
            stageElement.innerText = stage;
            invaderSpeed = 1 + (stage * 0.2); 
            enemyShootProbability = 0.005 + (stage * 0.002); // 스테이지가 오를수록 공격 빈도 증가
            playerBullets = [];
            enemyBullets = [];
            createInvaders();
        }

        function createInvaders() {
            invaders = [];
            for (let r = 0; r < invaderRows; r++) {
                for (let c = 0; c < invaderCols; c++) {
                    const invaderX = c * (invaderWidth + invaderPadding) + invaderOffsetLeft;
                    const invaderY = r * (invaderHeight + invaderPadding) + invaderOffsetTop;
                    invaders.push({
                        x: invaderX,
                        y: invaderY,
                        width: invaderWidth,
                        height: invaderHeight,
                        alive: true,
                        color: r % 2 === 0 ? "#00ffff" : "#ff00ff"
                    });
                }
            }
        }

        function firePlayerBullet() {
            if (isGameOver) return;
            if (playerBullets.length < 3) { // 플레이어 화면 내 미사일 최대 3개 제한
                playerBullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 15,
                    speed: 7
                });
            }
        }

        // 외계인의 반격 로직
        function enemyShoot() {
            invaders.forEach(invader => {
                if (!invader.alive) return;

                // 확률적으로 미사일 발사
                if (Math.random() < enemyShootProbability) {
                    enemyBullets.push({
                        x: invader.x + invader.width / 2 - 2,
                        y: invader.y + invader.height,
                        width: 4,
                        height: 12,
                        speed: 4 + (stage * 0.5) // 스테이지가 올라가면 미사일 속도도 약간 증가
                    });
                }
            });
        }

        // 루프 업데이트
        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 데이터 갱신
            updatePlayer();
            updatePlayerBullets();
            updateEnemyBullets();
            updateInvaders();
            enemyShoot();

            // 충돌 체크
            checkCollisions();

            // 오브젝트 렌더링
            drawPlayer();
            drawPlayerBullets();
            drawEnemyBullets();
            drawInvaders();

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            if (player.isMovingLeft && player.x > 0) {
                player.x -= player.speed;
            }
            if (player.isMovingRight && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // 무적 타이머 업데이트
            if (player.isInvincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) {
                    player.isInvincible = false;
                }
            }
        }

        function updatePlayerBullets() {
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                playerBullets[i].y -= playerBullets[i].speed;
                if (playerBullets[i].y < 0) {
                    playerBullets.splice(i, 1);
                }
            }
        }

        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].y += enemyBullets[i].speed;
                // 바닥 영역을 벗어나면 삭제
                if (enemyBullets[i].y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
            }
        }

        function updateInvaders() {
            let hitWall = false;

            invaders.forEach(invader => {
                if (!invader.alive) return;
                invader.x += invaderSpeed * invaderDirection;

                if (invader.x + invader.width >= canvas.width || invader.x <= 0) {
                    hitWall = true;
                }

                if (invader.y + invader.height >= player.y) {
                    triggerGameOver();
                }
            });

            if (hitWall) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    if (invader.alive) invader.y += invaderDropDistance;
                });
            }
        }

        function checkCollisions() {
            let aliveCount = 0;

            // 1. 플레이어 미사일 -> 외계인 충돌 판정
            for (let i = 0; i < invaders.length; i++) {
                const inv = invaders[i];
                if (!inv.alive) continue;
                aliveCount++;

                for (let j = playerBullets.length - 1; j >= 0; j--) {
                    const b = playerBullets[j];

                    if (b.x > inv.x && b.x < inv.x + inv.width &&
                        b.y > inv.y && b.y < inv.y + inv.height) {
                        
                        inv.alive = false;
                        playerBullets.splice(j, 1);
                        score += 20;
                        scoreElement.innerText = score;
                        break;
                    }
                }
            }

            // 모든 적 격추 시 다음 스테이지 이동
            if (aliveCount === 0 && invaders.length > 0) {
                nextStage();
                return;
            }

            // 2. 외계인 미사일 -> 플레이어 충돌 판정
            if (!player.isInvincible) {
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const eb = enemyBullets[i];

                    if (eb.x > player.x && eb.x < player.x + player.width &&
                        eb.y > player.y && eb.y < player.y + player.height) {
                        
                        enemyBullets.splice(i, 1);
                        lives--;
                        livesElement.innerText = lives;

                        if (lives <= 0) {
                            triggerGameOver();
                        } else {
                            // 피격 시 1초 동안 무적 (60프레임 기준)
                            player.isInvincible = true;
                            player.invincibleTimer = 60; 
                        }
                        break;
                    }
                }
            }
        }

        function drawPlayer() {
            // 무적 상태일 때는 깜빡거리는 연출 부여
            if (player.isInvincible && Math.floor(player.invincibleTimer / 5) % 2 === 0) {
                return;
            }
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(player.x, player.y + 5, player.width, player.height - 5);
            ctx.fillRect(player.x + player.width / 2 - 4, player.y, 8, 5);
        }

        function drawPlayerBullets() {
            ctx.fillStyle = "#ffff00";
            playerBullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
        }

        function drawEnemyBullets() {
            ctx.fillStyle = "#ff3333"; // 적 투사체는 빨간색으로 시각적 대비
            enemyBullets.forEach(eb => {
                ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
            });
        }

        function drawInvaders() {
            invaders.forEach(inv => {
                if (!inv.alive) return;
                ctx.fillStyle = inv.color;
                ctx.fillRect(inv.x, inv.y, inv.width, inv.height);
                
                // 눈 그래픽 내부 구현
                ctx.fillStyle = "#000000";
                ctx.fillRect(inv.x + 6, inv.y + 6, 5, 5);
                ctx.fillRect(inv.x + inv.width - 11, inv.y + 6, 5, 5);
            });
        }

        function triggerGameOver() {
            isGameOver = true;
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "game-over-text";
            overlayScreen.style.display = "flex";
        }
    </script>
</body>
</html>
