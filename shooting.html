<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평범한 슈팅게임</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
        }

        #ui-container {
            width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #lives-display {
            color: #00ff00;
            letter-spacing: 3px;
        }

        #boss-hp-container {
            width: 600px;
            height: 20px;
            background-color: #222;
            border: 2px solid #ff3333;
            margin-bottom: 10px;
            visibility: hidden;
            position: relative;
        }

        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.05s ease-out;
        }

        #boss-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            top: 2px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        #overlay-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 600px;
            height: 500px;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        #overlay-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .game-over-text { color: #ff3333; }

        #restart-btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            background-color: #00ff00;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background-color: #00cc00;
            box-shadow: 0 0 10px #00ff00;
        }

        #controls-guide {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>평범한 슈팅게임</h1>
    
    <div id="ui-container">
        <div>SCORE: <span id="score">0</span></div>
        <div>STAGE: <span id="stage">1</span></div>
        <div>LIVES: <span id="lives-display"></span></div>
    </div>

    <div id="boss-hp-container">
        <div id="boss-hp-bar"></div>
        <div id="boss-text">WARNING: BOSS APPEARED</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div id="overlay-screen">
            <div id="overlay-title">GAME OVER</div>
            <button id="restart-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="controls-guide">
        [← / →] 또는 [A / D] : 이동 | [Spacebar] : 미사일 발사 (피격 시 무적 1.5초)<br>
        <strong>[Shift 누르고 있기] : 저속 모드 (정밀 회피 및 가이드 라인 표기)</strong>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const stageElement = document.getElementById("stage");
        const livesDisplay = document.getElementById("lives-display");
        const bossHpContainer = document.getElementById("boss-hp-container");
        const bossHpBar = document.getElementById("boss-hp-bar");
        const bossText = document.getElementById("boss-text");
        const overlayScreen = document.getElementById("overlay-screen");
        const overlayTitle = document.getElementById("overlay-title");

        // 게임 기본 설정
        let score = 0;
        let stage = 1;
        let lives = 3;
        const maxLives = 3; 
        let isGameOver = false;

        // 플레이어 설정
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 40,
            width: 40,
            height: 20,
            normalSpeed: 6,    
            slowSpeed: 2.5,    
            isMovingLeft: false,
            isMovingRight: false,
            isSlowMode: false, 
            isInvincible: false,
            invincibleTimer: 0,
            coreRadius: 2.5 
        };

        // 투사체 및 적 배열
        let playerBullets = [];
        let enemyBullets = []; 
        let invaders = [];

        // 일반 외계인 설정 (난이도 상향)
        const invaderRows = 4;
        const invaderCols = 8;
        const invaderWidth = 35;
        const invaderHeight = 25;
        const invaderPadding = 15;
        const invaderOffsetTop = 50;
        const invaderOffsetLeft = 50;
        
        let invaderDirection = 1; 
        let invaderSpeed = 1;
        let invaderDropDistance = 15;
        let enemyShootProbability = 0.009; // 잡몹 사격 확률 증가 (기존 0.005)

        // 보스(Boss) 객체 정의
        const boss = {
            x: 0,
            y: 0,
            width: 60,   
            height: 40,
            speed: 2.2,  
            direction: 1,
            active: false,
            hp: 12,       // 초기 체력 증가 (기존 10 -> 12)
            maxHp: 12,
            shootCooldown: 0,
            patternTimer: 0,
            phase: 1,
            floatTimer: 0
        };

        // 키보드 제어 이벤트
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = true;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = true;
            if (e.key === "Shift") player.isSlowMode = true; 
            if (e.key === " " || e.code === "Space") {
                e.preventDefault();
                firePlayerBullet();
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") player.isMovingLeft = false;
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") player.isMovingRight = false;
            if (e.key === "Shift") player.isSlowMode = false; 
        });

        // 최초 실행
        initGame();

        function initGame() {
            score = 0;
            stage = 1;
            lives = 3;
            isGameOver = false;
            invaderSpeed = 1;
            enemyShootProbability = 0.009;
            
            scoreElement.innerText = score;
            stageElement.innerText = stage;
            updateLivesUI();
            overlayScreen.style.display = "none";
            bossHpContainer.style.visibility = "hidden";

            playerBullets = [];
            enemyBullets = [];
            player.isInvincible = false;
            player.isSlowMode = false;
            player.x = canvas.width / 2 - 20;
            boss.active = false;

            createInvaders();
            
            cancelAnimationFrame(gameLoop);
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            initGame();
        }

        function updateLivesUI() {
            let livesText = "";
            for (let i = 0; i < lives; i++) {
                livesText += "▲ ";
            }
            livesDisplay.innerText = livesText || "NONE";
        }

        function nextStage() {
            if (lives < maxLives) {
                lives++;
                updateLivesUI();
            }

            stage++;
            stageElement.innerText = stage;
            invaderSpeed = 1 + (stage * 0.25); // 스테이지별 잡몹 이동속도 증가폭 상향
            enemyShootProbability = 0.009 + (stage * 0.0015); // 스테이지별 잡몹 사격률 증가폭 상향
            playerBullets = [];
            enemyBullets = [];
            boss.active = false;
            bossHpContainer.style.visibility = "hidden";
            createInvaders();
        }

        function spawnBoss() {
            boss.active = true;
            boss.phase = 1;
            boss.maxHp = 12 + (stage - 1) * 2; // 초기체력 12 기준 성장 공식 적용
            boss.hp = boss.maxHp;
            boss.x = canvas.width / 2 - boss.width / 2;
            boss.y = 70;
            boss.speed = 2.0 + (stage * 0.2); 
            boss.shootCooldown = 0;
            boss.patternTimer = 0;
            boss.floatTimer = 0;
            
            bossText.innerText = "WARNING: BOSS - 1페이즈";
            bossHpContainer.style.visibility = "visible";
            updateBossHpBar();
        }

        function updateBossHpBar() {
            const hpPercentage = (boss.hp / boss.maxHp) * 100;
            bossHpBar.style.width = hpPercentage + "%";

            if (hpPercentage <= 50 && boss.phase === 1) {
                boss.phase = 2;
                bossText.innerText = "WARNING: BOSS - 2페이즈 ACTIVATE";
                enemyBullets = []; 
            }
        }

        function createInvaders() {
            invaders = [];
            for (let r = 0; r < invaderRows; r++) {
                for (let c = 0; c < invaderCols; c++) {
                    invaders.push({
                        x: c * (invaderWidth + invaderPadding) + invaderOffsetLeft,
                        y: r * (invaderHeight + invaderPadding) + invaderOffsetTop,
                        width: invaderWidth,
                        height: invaderHeight,
                        alive: true,
                        color: r % 2 === 0 ? "#00ffff" : "#ff00ff"
                    });
                }
            }
        }

        function firePlayerBullet() {
            if (isGameOver) return;
            if (playerBullets.length < 4) { 
                playerBullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 15,
                    speed: 8
                });
            }
        }

        function enemyShoot() {
            if (boss.active) return; 

            invaders.forEach(invader => {
                if (!invader.alive) return;
                if (Math.random() < enemyShootProbability) {
                    enemyBullets.push({
                        x: invader.x + invader.width / 2,
                        y: invader.y + invader.height,
                        vx: 0, 
                        vy: 4.5 + (stage * 0.35), // 잡몹 탄속 약간 상향 (기존 4.0)
                        radius: 3, 
                        color: "#ff3333",
                        type: "normal"
                    });
                }
            });
        }

        function bossShoot() {
            if (!boss.active) return;

            boss.shootCooldown++;
            boss.patternTimer++;

            // [1페이즈 탄막] 6방향 회전 방사탄 + 플레이어 유도 조준탄
            if (boss.phase === 1) {
                if (boss.shootCooldown >= 35) {
                    boss.shootCooldown = 0;
                    const baseAngle = (boss.patternTimer / 12); 
                    for (let i = 0; i < 6; i++) {
                        const angle = baseAngle + (Math.PI * 2 / 6) * i;
                        const speed = 3.5;
                        enemyBullets.push({
                            x: boss.x + boss.width / 2,
                            y: boss.y + boss.height,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            radius: 4,
                            color: "#00ffff", 
                            type: "circle"
                        });
                    }
                }

                if (boss.patternTimer >= 95) {
                    boss.patternTimer = 0;
                    const pCoreX = player.x + player.width / 2;
                    const pCoreY = player.y + player.height / 2;
                    const angleToPlayer = Math.atan2(pCoreY - (boss.y + boss.height), pCoreX - (boss.x + boss.width / 2));
                    const speed = 5.2 + (stage * 0.2);
                    
                    enemyBullets.push({
                        x: boss.x + boss.width / 2,
                        y: boss.y + boss.height,
                        vx: Math.cos(angleToPlayer) * speed,
                        vy: Math.sin(angleToPlayer) * speed,
                        radius: 5,
                        color: "#ffaa00",
                        type: "needle"
                    });
                }
            } 
            // [2페이즈 탄막] 천장 무작위 낙하 거대 빙결탄 + 부채꼴 탄막 숲
            else if (boss.phase === 2) {
                if (boss.shootCooldown >= 25) {
                    boss.shootCooldown = 0;
                    const count = 4 + stage; 
                    for (let i = 0; i < count; i++) {
                        const angle = Math.PI * 0.25 + (Math.PI * 0.5 / count) * i; 
                        const speed = 3.2 + Math.random() * 1.5;
                        enemyBullets.push({
                            x: boss.x + boss.width / 2,
                            y: boss.y + boss.height,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            radius: 3.5,
                            color: "#ff00ff",
                            type: "circle"
                        });
                    }
                }

                if (boss.patternTimer >= 45) {
                    boss.patternTimer = 0;
                    const spawnX = 40 + Math.random() * (canvas.width - 80);
                    enemyBullets.push({
                        x: spawnX,
                        y: 0, 
                        vx: (Math.random() - 0.5) * 0.8, 
                        vy: 2.3 + (stage * 0.3), 
                        radius: 11, 
                        color: "#3399ff",
                        type: "pyramid"
                    });
                }
            }
        }

        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updatePlayerBullets();
            updateEnemyBullets();
            
            if (boss.active) {
                updateBoss();
                bossShoot();
            } else {
                updateInvaders();
                enemyShoot();
            }

            checkCollisions();

            drawPlayer();
            drawPlayerBullets();
            drawEnemyBullets();
            
            if (boss.active) {
                drawBoss();
            } else {
                drawInvaders();
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            const currentSpeed = player.isSlowMode ? player.slowSpeed : player.normalSpeed;

            if (player.isMovingLeft && player.x > 0) player.x -= currentSpeed;
            if (player.isMovingRight && player.x < canvas.width - player.width) player.x += currentSpeed;

            if (player.isInvincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) player.isInvincible = false;
            }
        }

        function updatePlayerBullets() {
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                playerBullets[i].y -= playerBullets[i].speed;
                if (playerBullets[i].y < 0) playerBullets.splice(i, 1);
            }
        }

        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].x += enemyBullets[i].vx;
                enemyBullets[i].y += enemyBullets[i].vy;

                if (enemyBullets[i].y > canvas.height + 15 || enemyBullets[i].x < -15 || enemyBullets[i].x > canvas.width + 15) {
                    enemyBullets.splice(i, 1);
                }
            }
        }

        function updateInvaders() {
            let hitWall = false;
            let aliveCount = 0;

            invaders.forEach(invader => {
                if (!invader.alive) return;
                aliveCount++;
                invader.x += invaderSpeed * invaderDirection;

                if (invader.x + invader.width >= canvas.width || invader.x <= 0) hitWall = true;
                if (invader.y + invader.height >= player.y) triggerGameOver();
            });

            if (hitWall) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    if (invader.alive) invader.y += invaderDropDistance;
                });
            }

            if (aliveCount === 0 && invaders.length > 0 && !boss.active) {
                spawnBoss();
            }
        }

        function updateBoss() {
            boss.floatTimer += 0.05;
            boss.x += boss.speed * boss.direction;
            if (boss.x + boss.width >= canvas.width - 20 || boss.x <= 20) {
                boss.direction *= -1;
            }
            boss.y = 70 + Math.sin(boss.floatTimer) * 8;
        }

        function checkCollisions() {
            for (let j = playerBullets.length - 1; j >= 0; j--) {
                const b = playerBullets[j];

                if (boss.active) {
                    if (b.x > boss.x && b.x < boss.x + boss.width &&
                        b.y > boss.y && b.y < boss.y + boss.height) {
                        
                        playerBullets.splice(j, 1);
                        boss.hp--;
                        score += 50;
                        scoreElement.innerText = score;
                        updateBossHpBar();

                        if (boss.hp <= 0) {
                            score += 1000; 
                            scoreElement.innerText = score;
                            nextStage();
                        }
                        continue;
                    }
                } else {
                    for (let i = 0; i < invaders.length; i++) {
                        const inv = invaders[i];
                        if (!inv.alive) continue;

                        if (b.x > inv.x && b.x < inv.x + inv.width &&
                            b.y > inv.y && b.y < inv.y + inv.height) {
                            
                            inv.alive = false;
                            playerBullets.splice(j, 1);
                            score += 20;
                            scoreElement.innerText = score;
                            break;
                        }
                    }
                }
            }

            if (!player.isInvincible) {
                const coreX = player.x + player.width / 2;
                const coreY = player.y + player.height / 2 + 2;

                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const eb = enemyBullets[i];
                    
                    const dist = Math.hypot(coreX - eb.x, coreY - eb.y);
                    const hitRadius = eb.radius; 

                    if (dist < player.coreRadius + hitRadius) {
                        enemyBullets.splice(i, 1);
                        lives--;
                        updateLivesUI();

                        if (lives <= 0) {
                            triggerGameOver();
                        } else {
                            player.isInvincible = true;
                            player.invincibleTimer = 90; 
                        }
                        break;
                    }
                }
            }
        }

        function drawPlayer() {
            if (player.isInvincible && Math.floor(player.invincibleTimer / 5) % 2 === 0) return;
            
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(player.x, player.y + 5, player.width, player.height - 5);
            ctx.fillRect(player.x + player.width / 2 - 4, player.y, 8, 5);

            if (player.isSlowMode) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.beginPath();
                ctx.arc(player.x + player.width / 2, player.y + player.height / 2 + 2, 7, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + player.height / 2 + 2, player.coreRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlayerBullets() {
            ctx.fillStyle = "#ffff00";
            playerBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
        }

        function drawEnemyBullets() {
            enemyBullets.forEach(eb => {
                ctx.fillStyle = eb.color;
                
                if (eb.type === "normal" || eb.type === "circle") {
                    ctx.beginPath();
                    ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (eb.type === "needle") {
                    ctx.beginPath();
                    ctx.moveTo(eb.x, eb.y - eb.radius * 1.4);
                    ctx.lineTo(eb.x + eb.radius, eb.y);
                    ctx.lineTo(eb.x, eb.y + eb.radius * 1.4);
                    ctx.lineTo(eb.x - eb.radius, eb.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (eb.type === "pyramid") {
                    ctx.beginPath();
                    ctx.moveTo(eb.x, eb.y - eb.radius);
                    ctx.lineTo(eb.x + eb.radius, eb.y + eb.radius);
                    ctx.lineTo(eb.x - eb.radius, eb.y + eb.radius);
                    ctx.closePath();
                    ctx.fill();
                }
            });
        }

        function drawInvaders() {
            invaders.forEach(inv => {
                if (!inv.alive) return;
                ctx.fillStyle = inv.color;
                ctx.fillRect(inv.x, inv.y, inv.width, inv.height);
                
                ctx.fillStyle = "#000000";
                ctx.fillRect(inv.x + 6, inv.y + 6, 5, 5);
                ctx.fillRect(inv.x + inv.width - 11, inv.y + 6, 5, 5);
            });
        }

        function drawBoss() {
            ctx.fillStyle = boss.phase === 1 ? "#ff0055" : "#00ffaa";
            ctx.fillRect(boss.x, boss.y, boss.width, boss.height);

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(boss.x + 12, boss.y + 10, 10, 10);
            ctx.fillRect(boss.x + boss.width - 22, boss.y + 10, 10, 10);
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(boss.x + 15, boss.y + 13, 5, 5);
            ctx.fillRect(boss.x + boss.width - 19, boss.y + 13, 5, 5);
        }

        function triggerGameOver() {
            isGameOver = true;
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "game-over-text";
            overlayScreen.style.display = "flex";
        }
    </script>
</body>
</html>
